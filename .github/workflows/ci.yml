name: CI

on:
  push:
    branches: [master]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  test:
    name: Forge Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - run: forge build
      - run: forge test -vvv
      - run: forge fmt --check

  build-sdk:
    name: Build SDK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
      - uses: oven-sh/setup-bun@v2

      - run: forge build
      - run: cd sdk && bun install --frozen-lockfile
      - run: cd sdk && bun run lint
      - run: cd sdk && bun run build
      - run: cd sdk && bun test

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/
